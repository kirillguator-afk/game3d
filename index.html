<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aetheria Online | Kingdom Expansion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-black overflow-hidden">
    <div id="game-view" class="absolute inset-0"></div>

    <!-- UI Overlay -->
    <div id="hud" class="absolute inset-0 pointer-events-none flex flex-col justify-between p-6 z-50">
        <div class="flex justify-between items-start pointer-events-auto">
            <!-- Player Plate -->
            <div class="flex gap-4 items-center bg-black/80 backdrop-blur-md p-4 rounded-2xl border-2 border-white/10 shadow-[0_0_20px_rgba(0,0,0,0.5)]">
                <div class="relative">
                    <div class="w-16 h-16 bg-blue-600 rounded-xl flex items-center justify-center border-2 border-white/30 rotate-3">
                        <span class="text-white font-pixel text-2xl -rotate-3">N</span>
                    </div>
                    <div class="absolute -bottom-2 -right-2 bg-yellow-500 text-black font-pixel text-[8px] px-2 py-1 rounded border border-black">LV.42</div>
                </div>
                <div class="flex flex-col gap-2">
                    <span class="text-white font-pixel text-[12px] tracking-widest">NEXUS_PRIME</span>
                    <div class="flex flex-col gap-1">
                        <div class="w-48 h-4 bg-gray-900 rounded-full border border-white/10 overflow-hidden p-[2px]">
                            <div class="h-full bg-gradient-to-r from-red-600 to-orange-500 rounded-full w-[85%] shadow-[0_0_10px_red]"></div>
                        </div>
                        <div class="w-40 h-3 bg-gray-900 rounded-full border border-white/10 overflow-hidden p-[2px]">
                            <div class="h-full bg-gradient-to-r from-blue-600 to-cyan-400 rounded-full w-[60%] shadow-[0_0_10px_blue]"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Minimap & Location -->
            <div class="flex flex-col items-end gap-3">
                <div class="bg-black/80 backdrop-blur-md px-6 py-3 rounded-2xl border-2 border-yellow-500/50 flex flex-col items-end">
                    <span class="text-yellow-500 font-pixel text-[8px] uppercase mb-1">Current Region</span>
                    <span id="location-name" class="text-white font-pixel text-[14px]">Royal Plaza</span>
                </div>
                <div class="w-32 h-32 bg-black/60 rounded-full border-4 border-white/10 overflow-hidden relative shadow-2xl">
                    <div class="absolute inset-0 border-2 border-dashed border-white/5 animate-spin-slow"></div>
                    <div class="absolute top-1/2 left-1/2 w-2 h-2 bg-white rounded-full -translate-x-1/2 -translate-y-1/2 shadow-[0_0_5px_white]"></div>
                </div>
            </div>
        </div>

        <!-- Chat & Controls -->
        <div class="flex justify-between items-end pointer-events-auto">
            <div class="w-96 flex flex-col gap-3">
                <div id="chat" class="h-48 bg-black/60 backdrop-blur-xl rounded-2xl p-4 text-[12px] overflow-y-auto flex flex-col gap-2 border border-white/10 shadow-2xl">
                    <div class="text-yellow-400 font-bold">[SYSTEM]: Добро пожаловать в Королевство Этерия.</div>
                    <div class="text-blue-300"><span class="font-bold">Guard:</span> Дороги нынче небезопасны, путник.</div>
                    <div class="text-purple-400"><span class="font-bold">Merchant:</span> Свежие зелья только у меня!</div>
                    <div class="text-white/50 italic">Вы вошли в безопасную зону.</div>
                </div>
                <div class="relative">
                    <input type="text" placeholder="Напишите сообщение..." class="w-full bg-black/90 border-2 border-white/10 rounded-xl px-5 py-4 text-white text-xs outline-none focus:border-blue-500 transition-all shadow-xl">
                    <div class="absolute right-4 top-1/2 -translate-y-1/2 text-[8px] text-white/30 font-pixel underline">ENTER</div>
                </div>
            </div>

            <!-- Action Bar -->
            <div class="flex gap-2 bg-black/80 p-2 rounded-2xl border border-white/10 backdrop-blur-md mb-2">
                <div class="w-12 h-12 bg-gray-800 rounded-xl border border-white/20 flex items-center justify-center hover:bg-blue-600 transition-colors cursor-pointer">
                    <div class="w-6 h-6 bg-red-500 rounded-sm"></div>
                </div>
                <div class="w-12 h-12 bg-gray-800 rounded-xl border border-white/20 flex items-center justify-center hover:bg-blue-600 transition-colors cursor-pointer">
                    <div class="w-6 h-6 bg-blue-500 rounded-sm"></div>
                </div>
                <div class="w-12 h-12 bg-gray-800 rounded-xl border border-white/20 flex items-center justify-center hover:bg-blue-600 transition-colors cursor-pointer">
                    <div class="w-6 h-6 bg-green-500 rounded-sm"></div>
                </div>
                <div class="w-12 h-12 bg-gray-800 rounded-xl border border-white/20 flex items-center justify-center hover:bg-blue-600 transition-colors cursor-pointer">
                    <div class="w-6 h-6 bg-yellow-500 rounded-sm"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/controls.js"></script>
    <script src="js/entities.js"></script>
    <script src="js/world.js"></script>
    <script src="js/engine.js"></script>
</body>
</html>
