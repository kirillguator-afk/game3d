
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aetheria: World Expansion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body class="bg-[#050508] select-none">
    <div id="game-view" class="absolute inset-0"></div>

    <!-- UI Overlay -->
    <div id="hud" class="absolute inset-0 pointer-events-none z-50 flex flex-col justify-between p-6">
        
        <!-- TOP: Player Info -->
        <div class="flex justify-between items-start pointer-events-auto">
            <div class="flex gap-4 items-center bg-black/80 p-4 border-b-4 border-r-4 border-indigo-900/50">
                <div class="relative w-16 h-16 bg-indigo-950 border-2 border-indigo-500/50 flex items-center justify-center">
                    <span class="text-3xl">🧙‍♂️</span>
                    <div class="absolute -bottom-2 -right-2 bg-indigo-600 text-[8px] font-pixel px-2 py-1 border-2 border-black text-white">42</div>
                </div>
                <div class="flex flex-col gap-2">
                    <div class="flex items-center gap-3">
                        <span class="text-white font-pixel text-xs tracking-tighter uppercase">Nexus Prime</span>
                    </div>
                    <div class="space-y-2">
                        <div class="w-48 h-4 bg-black border-2 border-white/10 p-0.5">
                            <div id="hp-bar" class="h-full bg-red-600 w-full shadow-[inset_0_2px_0_rgba(255,255,255,0.3)]"></div>
                        </div>
                        <div class="w-40 h-3 bg-black border-2 border-white/10 p-0.5">
                            <div id="mp-bar" class="h-full bg-indigo-500 w-full shadow-[inset_0_2px_0_rgba(255,255,255,0.3)]"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col items-end gap-3 font-pixel">
                <div class="bg-black/80 px-4 py-3 border-b-4 border-l-4 border-indigo-900/50 text-right">
                    <div id="biome-label" class="text-indigo-400 text-[8px] uppercase mb-2">Nexus Hub</div>
                    <div id="clock-label" class="text-white text-[10px]">12:00</div>
                </div>
                <button id="inventory-toggle" class="bg-indigo-700 hover:bg-indigo-600 text-white p-4 border-b-4 border-r-4 border-indigo-900 active:translate-y-1 transition-all">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zM5 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zM11 5a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V5zM11 13a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                </button>
            </div>
        </div>

        <!-- Interaction Prompt -->
        <div id="interaction-prompt" class="hidden absolute left-1/2 bottom-32 -translate-x-1/2 flex flex-col items-center gap-2 pointer-events-none">
            <div class="bg-white text-black px-3 py-1 font-pixel text-[10px] animate-bounce">PRESS [F]</div>
            <div id="interaction-text" class="bg-black/90 text-white px-4 py-2 border-2 border-indigo-500 font-pixel text-[8px]">TALK TO MERCHANT</div>
        </div>

        <!-- BOTTOM: Action Bar -->
        <div class="flex flex-col items-center gap-6 pointer-events-auto pb-4">
            <div id="action-bar" class="flex gap-4 bg-black/90 p-3 border-t-4 border-indigo-900/50">
                <div class="skill-slot" data-skill="Q"><div class="skill-icon">🔥</div><div class="cooldown"></div><span class="key-hint">Q</span></div>
                <div class="skill-slot" data-skill="E"><div class="skill-icon">⚡</div><div class="cooldown"></div><span class="key-hint">E</span></div>
                <div class="skill-slot" data-skill="R"><div class="skill-icon">❄️</div><div class="cooldown"></div><span class="key-hint">R</span></div>
                <div class="w-px bg-white/10 mx-2"></div>
                <div class="skill-slot w-24" data-skill="SPACE"><div class="skill-icon text-[10px] font-pixel">DASH</div><div class="cooldown"></div><span class="key-hint">_</span></div>
            </div>
        </div>
    </div>

    <!-- Dialogue / Shop Overlay -->
    <div id="dialogue-overlay" class="fixed inset-0 z-[110] hidden flex items-end justify-center p-12 bg-black/20 backdrop-blur-sm">
        <div class="w-full max-w-4xl bg-black border-4 border-indigo-600 p-8 flex gap-8">
            <div id="npc-portrait" class="w-32 h-32 bg-indigo-900/30 border-2 border-indigo-400 flex items-center justify-center text-5xl">👤</div>
            <div class="flex-grow">
                <div id="npc-name" class="text-indigo-400 font-pixel text-xs mb-4">NAME</div>
                <div id="npc-text" class="text-white font-pixel text-sm leading-relaxed mb-8">...</div>
                <div id="dialogue-options" class="flex flex-wrap gap-4">
                    <!-- Options injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Inventory Modal -->
    <div id="inv-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-8 backdrop-blur-md">
        <div class="w-full max-w-5xl bg-[#0a0a14] border-4 border-indigo-900 grid grid-cols-12 p-8 gap-8">
            <div class="col-span-4 space-y-6">
                <div class="bg-black/40 border-2 border-white/5 p-6 flex flex-col items-center">
                    <div class="w-48 h-64 bg-indigo-950/30 border-4 border-indigo-500/20 mb-6 flex items-center justify-center overflow-hidden">
                        <canvas id="inv-char-preview" width="128" height="192"></canvas>
                    </div>
                    <div class="grid grid-cols-3 gap-4 w-full" id="equip-slots">
                        <div class="equip-slot" data-slot="head">HEAD</div>
                        <div class="equip-slot" data-slot="body">BODY</div>
                        <div class="equip-slot" data-slot="weapon">ARM</div>
                    </div>
                </div>
            </div>
            <div class="col-span-8 flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-pixel text-white">GEAR & ITEMS</h2>
                    <button id="close-inv" class="text-white hover:text-red-500 font-pixel"> [X] </button>
                </div>
                <div id="inv-grid" class="grid grid-cols-6 gap-3 flex-grow overflow-y-auto pr-2"></div>
                <div class="mt-6 pt-6 border-t-2 border-white/5 flex justify-between items-center font-pixel">
                    <div class="text-yellow-500 text-sm">14,250 <span class="text-[8px] opacity-50">GOLD</span></div>
                    <button class="px-4 py-2 bg-white/5 text-[10px] text-white border-2 border-white/10 hover:bg-white/10">SORT</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/assets.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/entities.js"></script>
    <script src="js/world.js"></script>
    <script src="js/engine.js"></script>
</body>
</html>
